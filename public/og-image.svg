<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="purple-glow" cx="75%" cy="50%" r="45%">
      <stop offset="0%" stop-color="rgba(167,139,250,0.18)"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f13"/>

  <!-- Right purple glow gradient -->
  <rect width="1200" height="630" fill="url(#purple-glow)"/>

  <!-- Decorative circles (right side) -->
  <circle cx="1000" cy="160" r="130" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
  <circle cx="1000" cy="160" r="90"  fill="none" stroke="rgba(167,139,250,0.18)" stroke-width="1"/>
  <circle cx="1000" cy="160" r="50"  fill="rgba(167,139,250,0.06)"/>

  <circle cx="1100" cy="460" r="100" fill="none" stroke="rgba(167,139,250,0.10)" stroke-width="1"/>
  <circle cx="1100" cy="460" r="60"  fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <circle cx="1100" cy="460" r="28"  fill="rgba(167,139,250,0.08)"/>

  <circle cx="860"  cy="540" r="70"  fill="none" stroke="rgba(29,185,84,0.08)" stroke-width="1"/>
  <circle cx="860"  cy="540" r="40"  fill="rgba(29,185,84,0.04)"/>

  <!-- Left green accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#1DB954"/>
  <rect x="0" y="0" width="6" height="630" fill="#1DB954" filter="url(#glow-green)" opacity="0.6"/>

  <!-- CPP — glow layer -->
  <text x="78" y="318"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-size="220" font-weight="900"
    fill="#1DB954" opacity="0.18"
    filter="url(#glow-green)"
    letter-spacing="-4">CPP</text>

  <!-- CPP — main -->
  <text x="78" y="318"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-size="220" font-weight="900"
    fill="#1DB954"
    letter-spacing="-4">CPP</text>

  <!-- COPYPRACTICE PLAYER -->
  <text x="82" y="378"
    font-family="Arial, Helvetica, sans-serif"
    font-size="26" font-weight="400"
    fill="#a78bfa"
    letter-spacing="14">COPYPRACTICE PLAYER</text>

  <!-- Divider line -->
  <line x1="82" y1="408" x2="700" y2="408" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Description -->
  <text x="82" y="442"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22" fill="rgba(255,255,255,0.65)">보컬 · 악기 연습을 위한 스마트 플레이어</text>
  <text x="82" y="472"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20" fill="rgba(255,255,255,0.38)">구간 반복  ·  속도 조절  ·  가사 패널을 한 화면에</text>

  <!-- Feature pill badges -->
  <rect x="82"  y="498" width="96"  height="30" rx="15" fill="rgba(29,185,84,0.10)" stroke="rgba(29,185,84,0.35)" stroke-width="1"/>
  <text x="130" y="518" font-family="Arial, sans-serif" font-size="13" fill="#1DB954" text-anchor="middle">구간 반복</text>

  <rect x="190" y="498" width="96"  height="30" rx="15" fill="rgba(29,185,84,0.10)" stroke="rgba(29,185,84,0.35)" stroke-width="1"/>
  <text x="238" y="518" font-family="Arial, sans-serif" font-size="13" fill="#1DB954" text-anchor="middle">속도 조절</text>

  <rect x="298" y="498" width="96"  height="30" rx="15" fill="rgba(167,139,250,0.10)" stroke="rgba(167,139,250,0.35)" stroke-width="1"/>
  <text x="346" y="518" font-family="Arial, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle">가사 패널</text>

  <!-- URL -->
  <text x="82" y="578"
    font-family="'Courier New', Courier, monospace"
    font-size="17" fill="rgba(255,255,255,0.22)" letter-spacing="2">cpp-5ud.pages.dev</text>
</svg>
